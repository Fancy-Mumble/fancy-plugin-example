name: CI

on:
  push:
    branches: [main]
    # Publishing a tag like `v0.2.0` triggers the release job which
    # attaches every example's drop-in archive to a GitHub Release
    # automatically.
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ------------------------------------------------------------------
  # Fast gate: formatting, Clippy, and unit tests for the whole
  # workspace.  The build matrix waits for this to pass before
  # spinning up per-example runners.
  # ------------------------------------------------------------------
  check:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fancy-plugin
        uses: actions/checkout@v4
        with:
          path: fancy-plugin

      # The workspace Cargo.toml has a path dependency:
      #   mumble-plugin-api = { path = "../mumble-server/3rdparty/mumble-plugin-host/api" }
      # so mumble-server must be a sibling of the fancy-plugin checkout.
      - name: Checkout mumble-server
        uses: actions/checkout@v4
        with:
          repository: Fancy-Mumble/mumble-server
          path: mumble-server

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry & build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: fancy-plugin

      - name: Check formatting
        working-directory: fancy-plugin
        run: cargo fmt --all -- --check

      - name: Clippy
        working-directory: fancy-plugin
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        working-directory: fancy-plugin
        run: cargo test --workspace

  # ------------------------------------------------------------------
  # Per-example release build, on every desktop platform.
  #
  # The matrix is the cross product of (example x platform).  Each job
  # produces a self-contained drop-in archive containing the cdylib,
  # the per-example INI snippet and the per-example README.
  # ------------------------------------------------------------------
  build:
    name: Build ${{ matrix.example.crate }} (${{ matrix.platform.os }})
    needs: check
    runs-on: ${{ matrix.platform.os }}

    strategy:
      fail-fast: false
      matrix:
        # ---- One entry per workspace member ---------------------------
        # `crate` is the Cargo package name; `lib_stem` is the cdylib
        # base name as Rust produces it (`-` is rewritten to `_`).
        example:
          - crate: fancy-greeter
            lib_stem: fancy_greeter
            dir: examples/greeter
          - crate: fancy-gallery-showcase
            lib_stem: fancy_gallery_showcase
            dir: examples/gallery-showcase
          - crate: fancy-info-card
            lib_stem: fancy_info_card
            dir: examples/info-card
          - crate: fancy-feedback-form
            lib_stem: fancy_feedback_form
            dir: examples/feedback-form
          - crate: fancy-quick-poll
            lib_stem: fancy_quick_poll
            dir: examples/quick-poll
          - crate: fancy-chat-card
            lib_stem: fancy_chat_card
            dir: examples/chat-card

        # ---- One entry per target platform ----------------------------
        platform:
          - os: ubuntu-latest
            arch: linux-x86_64
            ext: so
            prefix: lib
            packager: tar
          - os: ubuntu-24.04-arm
            arch: linux-aarch64
            ext: so
            prefix: lib
            packager: tar
          # macos-latest is currently macOS 14 (Apple Silicon / aarch64).
          - os: macos-latest
            arch: macos-aarch64
            ext: dylib
            prefix: lib
            packager: tar
          - os: windows-latest
            arch: windows-x86_64
            ext: dll
            prefix: ""
            packager: zip

    steps:
      - name: Checkout fancy-plugin
        uses: actions/checkout@v4
        with:
          path: fancy-plugin

      - name: Checkout mumble-server
        uses: actions/checkout@v4
        with:
          repository: Fancy-Mumble/mumble-server
          path: mumble-server

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: fancy-plugin

      - name: Build release cdylib
        working-directory: fancy-plugin
        run: cargo build --release --lib -p ${{ matrix.example.crate }}

      # ---- Package: Linux / macOS -----------------------------------------
      - name: Assemble drop-in archive (Linux / macOS)
        if: matrix.platform.packager == 'tar'
        run: |
          set -eu
          lib_name="${{ matrix.platform.prefix }}${{ matrix.example.lib_stem }}.${{ matrix.platform.ext }}"
          archive="${{ matrix.example.crate }}-${{ matrix.platform.arch }}.tar.gz"
          mkdir stage
          cp "fancy-plugin/target/release/${lib_name}" stage/
          cp "fancy-plugin/${{ matrix.example.dir }}/plugin.example.ini" stage/
          cp "fancy-plugin/${{ matrix.example.dir }}/README.md" stage/
          tar czf "${archive}" -C stage .
          echo "archive=${archive}" >> "$GITHUB_ENV"

      # ---- Package: Windows -----------------------------------------------
      - name: Assemble drop-in archive (Windows)
        if: matrix.platform.packager == 'zip'
        shell: pwsh
        run: |
          $lib = "${{ matrix.example.lib_stem }}.${{ matrix.platform.ext }}"
          $archive = "${{ matrix.example.crate }}-${{ matrix.platform.arch }}.zip"
          New-Item -ItemType Directory -Force stage | Out-Null
          Copy-Item "fancy-plugin\target\release\$lib" stage\
          Copy-Item "fancy-plugin\${{ matrix.example.dir }}\plugin.example.ini" stage\
          Copy-Item "fancy-plugin\${{ matrix.example.dir }}\README.md" stage\
          Compress-Archive -Path "stage\*" -DestinationPath $archive
          "archive=$archive" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload drop-in archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.example.crate }}-${{ matrix.platform.arch }}
          path: ${{ env.archive }}

  # ------------------------------------------------------------------
  # Publish a GitHub Release and attach every archive.
  # Runs only when a `v*` tag is pushed.
  # ------------------------------------------------------------------
  release:
    name: GitHub Release
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all drop-in archives
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            fancy-*-linux-x86_64.tar.gz
            fancy-*-linux-aarch64.tar.gz
            fancy-*-macos-aarch64.tar.gz
            fancy-*-windows-x86_64.zip
          generate_release_notes: true
