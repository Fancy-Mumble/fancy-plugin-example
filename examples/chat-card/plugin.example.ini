# Example INI block for the fancy-chat-card plugin.
#
# Drop into your `mumble-server.ini` (or a file under `plugins.d/`)
# to enable the plugin.  Keys are optional; the defaults below are
# what the plugin uses when nothing is supplied.

[plugin.fancy-chat-card]
# Marker text used by `/chat-card` to label the bubble.  Plain text.
title = "Chat-card demo"

# Default action button label inside the posted chat bubble.
button_label = "Click me"
