; ---------------------------------------------------------------------------
; fancy-greeter plugin configuration
;
; Copy the lines below into your mumble-server.ini, then restart the
; server.  The plugin host reads `plugin.<name>.enabled` before calling
; on_load; all other keys are available to the plugin at runtime.
;
; Install steps (Linux):
;   1. Copy libfancy_greeter.so to /etc/mumble/plugins/
;   2. Append the lines below to /etc/mumble/mumble-server.ini
;   3. systemctl restart mumble-server
;
; Verify: curl http://127.0.0.1:64741/status
; ---------------------------------------------------------------------------

; Load the plugin at server startup.
plugin.fancy-greeter.enabled=true

; Message sent to every user immediately after they connect.
; {username} is replaced with the connecting user's display name.
plugin.fancy-greeter.greeting_template=Welcome to the server, {username}!

; Message logged server-side when a user disconnects.
plugin.fancy-greeter.farewell_template=Goodbye, {username}.

; TCP port for the HTTP status page (binds to 127.0.0.1 only).
; GET /status returns a JSON object with active_sessions and the
; current greeting template.
plugin.fancy-greeter.http_port=64741
